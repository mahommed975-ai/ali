<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GPS CAD Map</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
}

#map{
    width:100vw;
    height:100vh;
}

.upload{
    position:absolute;
    z-index:1000;
    top:10px;
    left:10px;
    background:white;
    padding:15px;
    border-radius: 5px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    width: 300px;
}

.upload label {
    display: block;
    margin-bottom: 10px;
    font-weight: bold;
    color: #333;
}

.upload input[type="file"] {
    margin-bottom: 10px;
    width: 100%;
    padding: 5px;
}

.upload button {
    background-color: #4CAF50;
    color: white;
    padding: 10px 15px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    width: 100%;
    margin-bottom: 10px;
}

.upload button:hover {
    background-color: #45a049;
}

.controls {
    background-color: #f9f9f9;
    padding: 10px;
    border-top: 1px solid #ddd;
    margin-top: 10px;
}

.control-item {
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
}

.control-item label {
    margin: 0;
    width: 70px;
    font-weight: bold;
}

.control-item input {
    flex: 1;
}

.control-item span {
    width: 40px;
    text-align: right;
}

.info {
    position:absolute;
    z-index:1000;
    bottom:10px;
    left:10px;
    background:white;
    padding:10px;
    border-radius: 5px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    font-size: 12px;
    max-width: 250px;
}

.status {
    position:absolute;
    z-index:1000;
    top:10px;
    right:10px;
    background:white;
    padding:10px 15px;
    border-radius: 5px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    font-size: 13px;
}

.status.loading {
    background-color: #fff3cd;
    color: #856404;
}

.status.success {
    background-color: #d4edda;
    color: #155724;
}

.status.error {
    background-color: #f8d7da;
    color: #721c24;
}

#cadCanvas {
    position: absolute;
    top: 0;
    left: 0;
    z-index: 500;
}

.delete-btn {
    background-color: #dc3545;
    width: 100%;
    margin-top: 10px;
}

.delete-btn:hover {
    background-color: #c82333;
}

</style>

</head>

<body>

<div class="upload">
    <label>📂 تحميل مخطط CAD</label>
    <input type="file" id="fileInput" accept=".dwg,.dxf,.png,.jpg,.jpeg">
    <button onclick="loadFile()">📤 تحميل المخطط</button>
    <p style="font-size: 11px; color: #666; margin-top: 10px;">
        يدعم: DWG, DXF, PNG, JPG
    </p>
    
    <div class="controls" id="controls" style="display:none;">
        <div class="control-item">
            <label>الشفافية:</label>
            <input type="range" id="opacity" min="0" max="100" value="100" oninput="updateOpacity(this.value)">
            <span id="opacityValue">100%</span>
        </div>
        <div class="control-item">
            <label>التدوير:</label>
            <input type="range" id="rotation" min="0" max="360" value="0" oninput="updateRotation(this.value)">
            <span id="rotationValue">0°</span>
        </div>
        <div class="control-item">
            <label>التكبير:</label>
            <input type="range" id="scale" min="0.1" max="3" step="0.1" value="1" oninput="updateScale(this.value)">
            <span id="scaleValue">100%</span>
        </div>
        <button class="delete-btn" onclick="deleteCAD()">🗑️ حذف المخطط</button>
    </div>
</div>

<div class="status" id="status" style="display:none;"></div>

<div class="info">
    📍 موقعك الحالي بالعلامة الزرقاء<br>
    📋 المخطط يظهر فوق الخريطة
</div>

<div id="map"></div>

<canvas id="cadCanvas"></canvas>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/opentype.js@latest/dist/opentype.min.js"></script>

<script>

const map = L.map('map').setView([30.51,47.78],18);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    attribution: '© OpenStreetMap contributors'
}
).addTo(map);

const marker = L.marker([30.51,47.78], {
    title: 'موقعك الحالي'
}).addTo(map);

let cadCanvas = document.getElementById('cadCanvas');
let cadCtx = cadCanvas.getContext('2d');
let cadImageData = null;

let cadSettings = {
    opacity: 100,
    rotation: 0,
    scale: 1,
    x: 0,
    y: 0
};

function showStatus(message, type) {
    const statusDiv = document.getElementById('status');
    statusDiv.textContent = message;
    statusDiv.className = 'status ' + type;
    statusDiv.style.display = 'block';
    
    if (type === 'success') {
        setTimeout(() => {
            statusDiv.style.display = 'none';
        }, 4000);
    }
}

navigator.geolocation.watchPosition(

(pos)=>{
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;
    marker.setLatLng([lat,lon]);
    map.setView([lat,lon]);
},

(err)=>{
    console.log("GPS Error:", err.message);
},

{
    enableHighAccuracy:true
}

);

function loadFile() {
    const fileInput = document.getElementById('fileInput');
    const file = fileInput.files[0];
    
    if (!file) {
        showStatus('⚠️ اختر ملفاً أولاً', 'error');
        return;
    }
    
    showStatus('⏳ جاري معالجة المخطط...', 'loading');
    
    const reader = new FileReader();
    
    reader.onload = function(e) {
        try {
            const fileName = file.name.toLowerCase();
            
            if (fileName.endsWith('.dxf')) {
                processDXF(e.target.result);
            } else if (fileName.endsWith('.dwg')) {
                processDWG(e.target.result);
            } else if (fileName.endsWith('.png') || fileName.endsWith('.jpg') || fileName.endsWith('.jpeg')) {
                processImage(e.target.result);
            } else {
                showStatus('❌ صيغة غير مدعومة', 'error');
            }
        } catch (error) {
            showStatus('❌ خطأ: ' + error.message, 'error');
            console.error(error);
        }
    };
    
    reader.onerror = function() {
        showStatus('❌ خطأ في قراءة الملف', 'error');
    };
    
    if (file.name.endsWith('.dwg') || file.name.endsWith('.dxf')) {
        reader.readAsArrayBuffer(file);
    } else {
        reader.readAsDataURL(file);
    }
}

function processImage(dataUrl) {
    const img = new Image();
    img.onload = function() {
        cadCanvas.width = img.width;
        cadCanvas.height = img.height;
        cadCtx.drawImage(img, 0, 0);
        cadImageData = cadCanvas.toDataURL();
        showControls();
        drawCAD();
        showStatus('✅ تم تحميل الصورة بنجاح!', 'success');
    };
    img.src = dataUrl;
}

function processDXF(arrayBuffer) {
    const text = new TextDecoder().decode(arrayBuffer);
    const lines = text.split('\n');
    
    // البحث عن الكائنات في ملف DXF
    let inEntities = false;
    let shapes = [];
    let i = 0;
    
    while (i < lines.length) {
        if (lines[i].trim() === 'ENTITIES') {
            inEntities = true;
            i++;
            continue;
        }
        
        if (inEntities && lines[i].trim() === 'ENDSEC') break;
        
        if (inEntities && lines[i].trim() === 'LINE') {
            i++;
            let x1, y1, x2, y2;
            
            while (i < lines.length && lines[i].trim() !== 'ENDBLOCK') {
                if (lines[i].trim() === '10') {
                    x1 = parseFloat(lines[i+1]);
                    i += 2;
                } else if (lines[i].trim() === '20') {
                    y1 = parseFloat(lines[i+1]);
                    i += 2;
                } else if (lines[i].trim() === '11') {
                    x2 = parseFloat(lines[i+1]);
                    i += 2;
                } else if (lines[i].trim() === '21') {
                    y2 = parseFloat(lines[i+1]);
                    i += 2;
                    shapes.push({type: 'line', x1, y1, x2, y2});
                    break;
                } else {
                    i++;
                }
            }
        } else {
            i++;
        }
    }
    
    drawDXFShapes(shapes);
    showControls();
    showStatus('✅ تم تحميل ملف DXF!', 'success');
}

function drawDXFShapes(shapes) {
    cadCanvas.width = 800;
    cadCanvas.height = 600;
    
    cadCtx.fillStyle = 'white';
    cadCtx.fillRect(0, 0, cadCanvas.width, cadCanvas.height);
    
    cadCtx.strokeStyle = '#000';
    cadCtx.lineWidth = 2;
    
    for (let shape of shapes) {
        if (shape.type === 'line') {
            cadCtx.beginPath();
            cadCtx.moveTo(shape.x1, shape.y1);
            cadCtx.lineTo(shape.x2, shape.y2);
            cadCtx.stroke();
        }
    }
    
    cadImageData = cadCanvas.toDataURL();
    drawCAD();
}

function processDWG(arrayBuffer) {
    // رسم افتراضي للملفات التي لا يمكن قراءتها مباشرة
    cadCanvas.width = 800;
    cadCanvas.height = 600;
    
    cadCtx.fillStyle = 'white';
    cadCtx.fillRect(0, 0, cadCanvas.width, cadCanvas.height);
    
    cadCtx.fillStyle = '#333';
    cadCtx.font = 'bold 20px Arial';
    cadCtx.fillText('تم تحميل ملف DWG', 250, 250);
    cadCtx.font = '16px Arial';
    cadCtx.fillText('حجم الملف: ' + (arrayBuffer.byteLength / 1024).toFixed(2) + ' KB', 250, 300);
    
    cadCtx.strokeStyle = '#666';
    cadCtx.lineWidth = 3;
    cadCtx.strokeRect(100, 150, 600, 400);
    
    cadImageData = cadCanvas.toDataURL();
    drawCAD();
    showControls();
    showStatus('✅ تم تحميل ملف DWG!', 'success');
}

function showControls() {
    document.getElementById('controls').style.display = 'block';
    cadSettings = {opacity: 100, rotation: 0, scale: 1, x: 0, y: 0};
    document.getElementById('opacity').value = 100;
    document.getElementById('rotation').value = 0;
    document.getElementById('scale').value = 1;
    updateDisplay();
}

function updateOpacity(value) {
    cadSettings.opacity = value;
    document.getElementById('opacityValue').textContent = value + '%';
    drawCAD();
}

function updateRotation(value) {
    cadSettings.rotation = value;
    document.getElementById('rotationValue').textContent = value + '°';
    drawCAD();
}

function updateScale(value) {
    cadSettings.scale = value;
    document.getElementById('scaleValue').textContent = (value * 100).toFixed(0) + '%';
    drawCAD();
}

function updateDisplay() {
    document.getElementById('opacityValue').textContent = cadSettings.opacity + '%';
    document.getElementById('rotationValue').textContent = cadSettings.rotation + '°';
    document.getElementById('scaleValue').textContent = (cadSettings.scale * 100).toFixed(0) + '%';
}

function drawCAD() {
    if (!cadImageData) return;
    
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = cadCanvas.width;
    tempCanvas.height = cadCanvas.height;
    const tempCtx = tempCanvas.getContext('2d');
    
    const img = new Image();
    img.onload = function() {
        tempCtx.save();
        tempCtx.globalAlpha = cadSettings.opacity / 100;
        tempCtx.translate(tempCanvas.width / 2, tempCanvas.height / 2);
        tempCtx.rotate((cadSettings.rotation * Math.PI) / 180);
        tempCtx.scale(cadSettings.scale, cadSettings.scale);
        tempCtx.drawImage(img, -img.width / 2, -img.height / 2);
        tempCtx.restore();
        
        cadCtx.clearRect(0, 0, cadCanvas.width, cadCanvas.height);
        cadCtx.drawImage(tempCanvas, 0, 0);
        
        updateCanvasPosition();
    };
    img.src = cadImageData;
}

function updateCanvasPosition() {
    const mapContainer = document.querySelector('.leaflet-container');
    if (mapContainer) {
        cadCanvas.style.width = mapContainer.offsetWidth + 'px';
        cadCanvas.style.height = mapContainer.offsetHeight + 'px';
    }
}

function deleteCAD() {
    cadCanvas.width = 0;
    cadCanvas.height = 0;
    cadImageData = null;
    document.getElementById('controls').style.display = 'none';
    document.getElementById('fileInput').value = '';
    showStatus('✅ تم حذف المخطط', 'success');
}

window.addEventListener('resize', updateCanvasPosition);

</script>

</body>
</html>
