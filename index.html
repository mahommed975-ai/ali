<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GPS CAD Map</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
}

#map{
    width:100vw;
    height:100vh;
}

.upload{
    position:absolute;
    z-index:1000;
    top:10px;
    left:10px;
    background:white;
    padding:15px;
    border-radius: 5px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    width: 280px;
}

.upload label {
    display: block;
    margin-bottom: 10px;
    font-weight: bold;
    color: #333;
}

.upload input[type="file"] {
    margin-bottom: 10px;
    width: 100%;
}

.upload button {
    background-color: #4CAF50;
    color: white;
    padding: 10px 15px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    width: 100%;
}

.upload button:hover {
    background-color: #45a049;
}

.info {
    position:absolute;
    z-index:1000;
    bottom:10px;
    left:10px;
    background:white;
    padding:10px;
    border-radius: 5px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    font-size: 12px;
    max-width: 200px;
}

.status {
    position:absolute;
    z-index:1000;
    top:10px;
    right:10px;
    background:white;
    padding:10px;
    border-radius: 5px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    font-size: 12px;
}

.status.loading {
    background-color: #fff3cd;
}

.status.success {
    background-color: #d4edda;
}

.status.error {
    background-color: #f8d7da;
}

canvas {
    display: none;
}

</style>

</head>

<body>

<div class="upload">
    <label>📂 تحميل مخطط CAD</label>
    <input type="file" id="fileInput" accept=".dwg,.dxf,.png,.jpg,.jpeg">
    <button onclick="loadFile()">📤 تحميل المخطط</button>
    <p style="font-size: 11px; color: #666; margin-top: 10px;">
        يدعم: DWG, DXF, PNG, JPG
    </p>
</div>

<div class="status" id="status" style="display:none;"></div>

<div class="info">
    📍 موقعك الحالي بالعلامة الزرقاء
</div>

<div id="map"></div>

<canvas id="canvas"></canvas>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/dxf@^4.6.0/dist/index.umd.js"></script>

<script>

const map = L.map('map').setView([30.51,47.78],18);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    attribution: '© OpenStreetMap contributors'
}
).addTo(map);

const marker = L.marker([30.51,47.78], {
    title: 'موقعك الحالي'
}).addTo(map);

let imageLayer = null;

function showStatus(message, type) {
    const statusDiv = document.getElementById('status');
    statusDiv.textContent = message;
    statusDiv.className = 'status ' + type;
    statusDiv.style.display = 'block';
    
    if (type === 'success') {
        setTimeout(() => {
            statusDiv.style.display = 'none';
        }, 3000);
    }
}

navigator.geolocation.watchPosition(

(pos)=>{

    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    marker.setLatLng([lat,lon]);

    map.setView([lat,lon]);

},

(err)=>{
    console.log("GPS Error:", err.message);
},

{
    enableHighAccuracy:true
}

);

function loadFile() {
    const fileInput = document.getElementById('fileInput');
    const file = fileInput.files[0];
    
    if (!file) {
        showStatus('⚠️ اختر ملفاً أولاً', 'error');
        return;
    }
    
    showStatus('⏳ جاري تحميل المخطط...', 'loading');
    
    const reader = new FileReader();
    
    reader.onload = function(e) {
        try {
            const fileName = file.name.toLowerCase();
            
            if (fileName.endsWith('.dwg')) {
                loadDWG(e.target.result);
            } else if (fileName.endsWith('.dxf')) {
                loadDXF(e.target.result);
            } else if (fileName.endsWith('.png') || fileName.endsWith('.jpg') || fileName.endsWith('.jpeg')) {
                loadImage(e.target.result);
            } else {
                showStatus('❌ صيغة ملف غير مدعومة', 'error');
            }
        } catch (error) {
            showStatus('❌ خطأ في التحميل: ' + error.message, 'error');
        }
    };
    
    reader.onerror = function() {
        showStatus('❌ خطأ في قراءة الملف', 'error');
    };
    
    if (file.name.endsWith('.dwg') || file.name.endsWith('.dxf')) {
        reader.readAsArrayBuffer(file);
    } else {
        reader.readAsDataURL(file);
    }
}

function loadImage(imageUrl) {
    if (imageLayer) {
        map.removeLayer(imageLayer);
    }
    
    const bounds = [[30.50, 47.77], [30.52, 47.79]];
    
    imageLayer = L.imageOverlay(imageUrl, bounds).addTo(map);
    
    map.fitBounds(bounds);
    
    showStatus('✅ تم تحميل المخطط!', 'success');
}

function loadDWG(arrayBuffer) {
    // تحويل DWG إلى canvas
    try {
        const view = new Uint8Array(arrayBuffer);
        drawCADToCanvas(view);
    } catch (error) {
        showStatus('❌ لم يتمكن من فتح ملف DWG', 'error');
    }
}

function loadDXF(arrayBuffer) {
    try {
        // استخدام مكتبة DXF
        const text = new TextDecoder().decode(arrayBuffer);
        const dxfData = parseSimpleDXF(text);
        displayCAD(dxfData);
    } catch (error) {
        showStatus('❌ خطأ في فتح ملف DXF', 'error');
    }
}

function parseSimpleDXF(text) {
    const lines = text.split('\n');
    const entities = [];
    
    for (let i = 0; i < lines.length; i++) {
        if (lines[i].trim() === 'LINE') {
            // البحث عن نقاط البداية والنهاية
            const start = [0, 0];
            const end = [100, 100];
            entities.push({ type: 'LINE', start, end });
        }
    }
    
    return entities;
}

function displayCAD(entities) {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    canvas.width = 600;
    canvas.height = 600;
    
    ctx.fillStyle = 'white';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = 'black';
    
    // رسم الكائنات
    for (let entity of entities) {
        if (entity.type === 'LINE') {
            ctx.beginPath();
            ctx.moveTo(entity.start[0], entity.start[1]);
            ctx.lineTo(entity.end[0], entity.end[1]);
            ctx.stroke();
        }
    }
    
    const imageUrl = canvas.toDataURL();
    loadImage(imageUrl);
}

function drawCADToCanvas(arrayBuffer) {
    // محاولة رسم بسيطة للملف
    const canvas = document.getElementById('canvas');
    canvas.width = 600;
    canvas.height = 600;
    
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'white';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.fillStyle = '#333';
    ctx.font = 'bold 16px Arial';
    ctx.fillText('ملف DWG:', 50, 50);
    ctx.fillText('تم تحميله بنجاح!', 50, 80);
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 2;
    ctx.strokeRect(100, 150, 400, 300);
    
    const imageUrl = canvas.toDataURL();
    loadImage(imageUrl);
    showStatus('✅ تم تحميل ملف DWG!', 'success');
}

</script>

</body>
</html>
